- name: "install kubernetes"
  hosts: "{{ HOST }}"
  gather_facts: true
  become: yes
  vars:
    crio_version: "1.30"
    kuber_version: "1.36"
  roles:
    - swaptrasher
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
    
    - name: Perform a dist-upgrade
      ansible.builtin.apt:
        upgrade: dist
        force_apt_get: yes
         
    - name: installation packages deb
      apt:
        name:
         - software-properties-common
         - apt-transport-https
         - ca-certificates
         - gnupg2 
         - gpg
         - vim
         - curl
         - git
        state: present

    - name: modprobe overlay
      shell: modprobe overlay -v 
      
    - name: modprobe br_netfilter
      shell: modprobe br_netfilter -v ; echo "overlay" >> /etc/modules 
      
    - name: modprobe br_netfilter
      shell: modprobe br_netfilter -v ; echo "br_netfilter" >> /etc/modules 
      
    - name: ip forward
      shell: echo "net.ipv4.ip_forward = 1" > /etc/sysctl.d/99-ipforward.conf
      
    - name: add cri repo
      shell: echo "deb [signed-by=/etc/apt/keyrings/cri-o-apt-keyring.gpg] https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v{{ crio_version }}/deb/ /" | tee /etc/apt/sources.list.d/isv-cri-o-stable-v{{ crio_version }}.list
      
    - name: add kubernetes repo
      shell: echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://mirrors.ustc.edu.cn/kubernetes/core:/stable:/v{{ kuber_version }}/deb/ /" | tee /etc/apt/sources.list.d/kubernetes.list
      
    - name: add key for kubernetes repo
      shell: curl -fsSL https://mirrors.ustc.edu.cn/kubernetes/core:/stable:/v{{ kuber_version }}/deb/Release.key | sudo gpg --yes --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      
    - name: add key for cri repo
      shell: curl -fsSL https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v{{ crio_version }}/deb/Release.key | sudo gpg --yes --dearmor -o /etc/apt/keyrings/cri-o-apt-keyring.gpg
      
    - name: update apt cache
      ansible.builtin.apt:
        update_cache: yes
      
    - name: install kuber and dependencies
      shell: apt-get install -y kubelet kubeadm kubectl cri-o ; apt-mark hold kubelet kubeadm kubectl

    - name: enable crio
      shell: systemctl enable crio ; systemctl start crio ; systemctl status crio

    - name: Reboot and wait longer
      ansible.builtin.reboot:
        reboot_timeout: 600          
        msg: "Reboot initiated by Ansible" 